services:
  postgres:
    image: postgres:18-alpine
    container_name: kometa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kometa
      POSTGRES_USER: kometa
      POSTGRES_PASSWORD: kometa
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kometa -d kometa"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
